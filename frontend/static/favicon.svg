<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background matching SOLIX theme -->
  <rect width="32" height="32" rx="7" fill="#0b0d1a"/>
  <!-- Subtle blue inner glow ring -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)" opacity="0.4"/>
  <!-- 4-point SOLIX star mark (cyan) -->
  <path d="M16 4 L17.2 14.8 L28 16 L17.2 17.2 L16 28 L14.8 17.2 L4 16 L14.8 14.8 Z"
        fill="url(#star-grad)"
        style="filter: drop-shadow(0 0 3px rgba(91,213,252,0.9));"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#ffffff" opacity="0.9"/>
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0b0d1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bd5fc"/>
      <stop offset="50%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4361ee"/>
    </linearGradient>
  </defs>
</svg>
